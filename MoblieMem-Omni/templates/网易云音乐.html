<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>网易云音乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#1a1a1a;color:#fff;width:450px;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}

/* 状态栏 */
.status-bar{height:44px;display:flex;align-items:center;padding:0 20px;background:#1a1a1a;color:#fff}
.status-bar .time{font-size:15px;font-weight:600;flex:1}
.status-bar .icons{display:flex;gap:5px;align-items:center}
.status-bar .icons svg{width:17px;height:12px;fill:#fff}

/* 导航 */
.nav{height:44px;display:flex;align-items:center;padding:0 16px;background:#1a1a1a;justify-content:space-between}
.nav svg{width:10px;height:18px;fill:none;stroke:rgba(255,255,255,.7);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.nav .from{font-size:12px;color:rgba(255,255,255,.4);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav .right{display:flex;gap:14px;align-items:center}
.nav .right svg{width:20px;height:20px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:1.5}

/* 唱片区域 */
.disc-area{text-align:center;padding:24px 0 16px;position:relative}
.disc-wrap{position:relative;display:inline-block}
/* 唱针 */
.needle{position:absolute;top:-6px;right:120px;width:100px;height:140px;z-index:10;pointer-events:none}
.needle-arm{position:absolute;top:0;left:50px;width:6px;height:100px;
  background:linear-gradient(#aaa,#777);transform-origin:top center;transform:rotate(-25deg);border-radius:3px}
.needle-arm::before{content:'';position:absolute;top:-8px;left:-9px;width:24px;height:24px;
  border-radius:50%;background:radial-gradient(circle,#999 40%,#666 70%)}
.needle-arm::after{content:'';position:absolute;bottom:-4px;left:-4px;width:14px;height:14px;
  border-radius:50%;background:#555}
/* 唱片 */
.disc{width:240px;height:240px;border-radius:50%;margin:0 auto;position:relative;
  background:radial-gradient(circle at center,#444 30%,#222 31%,#333 50%,#222 51%,#2a2a2a 70%,#1a1a1a 71%);
  box-shadow:0 0 40px rgba(0,0,0,.5),inset 0 0 20px rgba(0,0,0,.3);
  animation:spin 20s linear infinite}
.disc .grooves{position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle,transparent 0,transparent 2px,rgba(255,255,255,.02) 2px,transparent 3px)}
.disc .inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,#ec4141,#c73434);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(236,65,65,.3)}
.disc .inner .note{font-size:28px;color:#fff;font-weight:700}
.disc .inner-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:100px;height:100px;border-radius:50%;border:1.5px solid rgba(255,255,255,.1)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* 歌曲信息 */
.song-info{text-align:center;padding:12px 24px 4px}
.song-info .name{font-size:21px;font-weight:700;color:#fff}
.song-info .artist{font-size:14px;color:rgba(255,255,255,.45);margin-top:4px}

/* 歌词 */
.lyric-area{text-align:center;padding:10px 32px;min-height:60px}
.lyric-line{font-size:15px;color:rgba(255,255,255,.3);margin:4px 0;transition:all .3s}
.lyric-line.prev{font-size:14px;color:rgba(255,255,255,.2)}
.lyric-line.current{font-size:17px;color:#fff;font-weight:500}
.lyric-line.next{font-size:14px;color:rgba(255,255,255,.2)}

/* 进度条 */
.progress{display:flex;align-items:center;gap:8px;padding:4px 24px;margin-top:4px}
.progress .time{font-size:10px;color:rgba(255,255,255,.3);width:38px;font-family:'SF Mono','Menlo',monospace}
.progress .time.right{text-align:right}
.bar{flex:1;height:2.5px;background:rgba(255,255,255,.12);border-radius:1.5px;position:relative}
.bar .fill{height:100%;background:#ec4141;border-radius:1.5px;position:relative;transition:width .3s}
.bar .fill::after{content:'';position:absolute;right:-5px;top:-4px;width:10px;height:10px;
  border-radius:50%;background:#fff;box-shadow:0 0 4px rgba(0,0,0,.3)}

/* 控制按钮 */
.controls{display:flex;align-items:center;justify-content:center;gap:32px;padding:16px 0}
.ctrl-btn{display:flex;align-items:center;justify-content:center}
.ctrl-btn svg{fill:rgba(255,255,255,.65);width:24px;height:24px}
.ctrl-btn.play{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center}
.ctrl-btn.play svg{fill:#fff;width:28px;height:28px;margin-left:3px}

/* 底部操作 */
.bottom-actions{display:flex;justify-content:space-around;padding:4px 40px 8px;margin-bottom:4px}
.bottom-act{text-align:center}
.bottom-act svg{width:22px;height:22px;fill:none;stroke:rgba(255,255,255,.4);stroke-width:1.5;display:block;margin:0 auto}

/* 来源歌单 */
.from-playlist{text-align:center;padding:6px 0;font-size:12px;color:rgba(255,255,255,.25)}

/* 热评 */
.hot-comment{margin:12px 20px 16px;background:rgba(255,255,255,.05);border-radius:12px;padding:14px 16px;
  border-left:3px solid #ec4141;position:relative}
.hot-comment .hd{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.hot-comment .hd .heart{color:#ec4141;font-size:14px}
.hot-comment .hd .label{font-size:12px;color:rgba(255,255,255,.35)}
.hot-comment .hd .likes{font-size:11px;color:rgba(255,255,255,.2);margin-left:auto}
.hot-comment .user{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hot-comment .user .avatar{width:28px;height:28px;border-radius:50%;background:#ec4141;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.hot-comment .user .uname{font-size:12px;color:rgba(255,255,255,.5)}
.hot-comment .txt{font-size:14px;line-height:1.7;color:rgba(255,255,255,.8)}
</style></head><body>

<!-- 状态栏 -->
<div class="status-bar">
  <span class="time">{{STATUS_TIME}}</span>
  <span class="icons">
    <svg viewBox="0 0 17 12"><path d="M1 8.5a7.5 7.5 0 0115 0" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 8.5a4.5 4.5 0 019 0" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="9" r="1.5" fill="currentColor"/></svg>
    <svg viewBox="0 0 16 12"><path d="M1 4h2v8H1zM5 2h2v10H5zM9 0h2v12H9zM13 3h2v9h-2z" fill="currentColor"/></svg>
    <svg viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="currentColor"/><path d="M23 4.5v3a1.5 1.5 0 000-3z" fill="currentColor"/></svg>
  </span>
</div>

<!-- 导航 -->
<div class="nav">
  <svg viewBox="0 0 12 20"><path d="M10 2L2 10l8 8"/></svg>
  <div class="from" id="fromText">{{PLAYLIST}}</div>
  <div class="right">
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
  </div>
</div>

<!-- 唱片 -->
<div class="disc-area">
  <div class="disc-wrap">
    <div class="needle"><div class="needle-arm"></div></div>
    <div class="disc">
      <div class="grooves"></div>
      <div class="inner-ring"></div>
      <div class="inner"><div class="note" id="discNote">♪</div></div>
    </div>
  </div>
</div>

<!-- 歌曲信息 -->
<div class="song-info">
  <div class="name">{{SONG}}</div>
  <div class="artist">{{ARTIST}}<span style="margin:0 6px;color:rgba(255,255,255,.2)">—</span>{{ALBUM}}</div>
</div>

<!-- 歌词 -->
<div class="lyric-area">
  <div class="lyric-line prev" id="lyricPrev"></div>
  <div class="lyric-line current">{{LYRIC_LINE}}</div>
  <div class="lyric-line next" id="lyricNext"></div>
</div>

<!-- 进度条 -->
<div class="progress">
  <span class="time">{{CURRENT_TIME}}</span>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <span class="time right">{{DURATION}}</span>
</div>

<!-- 控制按钮 -->
<div class="controls">
  <div class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M3 4h2v16H3zM7 12l14-8v16z" opacity=".5"/></svg></div>
  <div class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></div>
  <div class="ctrl-btn play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <div class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></div>
  <div class="ctrl-btn"><svg viewBox="0 0 24 24"><path d="M19 4h2v16h-2zM3 12l14 8V4z" opacity=".5"/></svg></div>
</div>

<!-- 底部操作 -->
<div class="bottom-actions">
  <div class="bottom-act"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
  <div class="bottom-act"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
  <div class="bottom-act"><svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
  <div class="bottom-act"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
</div>

<!-- 来源歌单 -->
<div class="from-playlist">来自歌单「{{PLAYLIST}}」</div>

<!-- 热评 -->
<div class="hot-comment" id="hotComment">
  <div class="hd">
    <span class="heart">♥</span>
    <span class="label">热评</span>
    <span class="likes" id="commentLikes"></span>
  </div>
  <div class="user">
    <div class="avatar" id="cmtAvatar">云</div>
    <div class="uname" id="cmtUser">{{COMMENT_USER}}</div>
  </div>
  <div class="txt">{{COMMENT}}</div>
</div>

<script>
(function(){
  // 进度条
  function t2s(t){ var p=t.split(':'); return (parseInt(p[0])||0)*60+(parseInt(p[1])||0); }
  var cur=t2s('{{CURRENT_TIME}}'), dur=t2s('{{DURATION}}');
  if(dur>0) document.getElementById('fill').style.width=(cur/dur*100)+'%';

  // 唱片中心文字
  var song = '{{SONG}}';
  if(song) document.getElementById('discNote').textContent = song.charAt(0);

  // 歌词上下文
  var prevLyric = '{{LYRIC_PREV}}';
  var nextLyric = '{{LYRIC_NEXT}}';
  if(prevLyric) document.getElementById('lyricPrev').textContent = prevLyric;
  if(nextLyric) document.getElementById('lyricNext').textContent = nextLyric;

  // 热评
  var cmt = '{{COMMENT}}';
  if(!cmt) document.getElementById('hotComment').style.display='none';
  var cmtUser = '{{COMMENT_USER}}';
  if(cmtUser) document.getElementById('cmtAvatar').textContent = cmtUser.charAt(0);
  document.getElementById('commentLikes').textContent = (Math.floor(Math.random()*500)+100) + ' 赞';
})();
</script>
</body></html>
