<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Payment Transfer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  background:#f7f8fa;color:#2d3436;width:450px;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}

/* ── iOS Status Bar ── */
.sb{height:44px;background:#fff;color:#000;display:flex;align-items:center;padding:0 16px;font-size:15px;font-weight:600}
.sb .time{flex:1}
.sb .ri{display:flex;gap:6px;align-items:center}
.sb .ri svg{height:12px}

/* ── Navigation ── */
.nav{
  background:#fff;height:48px;display:flex;align-items:center;
  padding:0 16px;position:relative;border-bottom:1px solid #eef0f2;
}
.nav .back{width:28px;display:flex;align-items:center}
.nav .back svg{width:10px;height:18px;fill:none;stroke:#2d3436;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.nav .t{flex:1;text-align:center;font-size:17px;font-weight:600;margin-right:28px}

/* ── Transfer Card ── */
.card{background:#fff;margin:16px;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.05)}

/* Header - icon + amount */
.card-hd{text-align:center;padding:36px 20px 28px;background:linear-gradient(180deg,#f0fdf4 0%,#fff 100%)}

.status-icon{
  width:60px;height:60px;border-radius:50%;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
}
.status-icon.ok{background:#dcfce7}
.status-icon.wait{background:#fef3c7}
.status-icon svg{width:32px;height:32px}
.status-icon.ok svg{fill:#16a34a}
.status-icon.wait svg{fill:#f59e0b}

.amount{font-size:48px;font-weight:700;color:#1a1a2e;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.amount .dollar{font-size:26px;font-weight:600;margin-right:2px;letter-spacing:0;vertical-align:top;line-height:48px}

.status-text{
  display:inline-block;margin-top:12px;padding:4px 16px;border-radius:16px;
  font-size:13px;font-weight:600;
}
.status-text.ok{background:#dcfce7;color:#16a34a}
.status-text.wait{background:#fef3c7;color:#f59e0b}

/* Description */
.desc-area{text-align:center;padding:0 20px 20px;font-size:14px;color:#6b7280}

/* ── Detail rows ── */
.cells{border-top:1px solid #f3f4f6}
.cell{
  display:flex;padding:16px 20px;align-items:center;
  border-bottom:1px solid #f3f4f6;
}
.cell:last-child{border-bottom:none}
.cell .lab{color:#9ca3af;font-size:13px;font-weight:500;width:110px;flex-shrink:0}
.cell .val{flex:1;text-align:right;font-size:14px;color:#2d3436;font-weight:500;word-break:break-all}
.cell .val.small{font-size:12px;color:#9ca3af}

/* ── Footer ── */
.footer{text-align:center;padding:20px 16px 28px}
.footer .secure{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:#9ca3af}
.footer .secure svg{width:14px;height:14px;fill:#9ca3af}
</style></head>
<body>

<!-- iOS Status Bar -->
<div class="sb">
  <span class="time">10:30 AM</span>
  <span class="ri">
    <svg viewBox="0 0 17 12" width="17"><path d="M8.5.5l8 11H.5z" fill="currentColor" opacity=".9"/></svg>
    <svg viewBox="0 0 16 12" width="16"><path d="M1 4h2v8H1zM5 2h2v10H5zM9 0h2v12H9zM13 3h2v9h-2z" fill="currentColor"/></svg>
    <svg viewBox="0 0 25 12" width="25"><rect x="0" y="1" width="22" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="17" height="7" rx="1" fill="currentColor"/><path d="M23 4.5v3a1.5 1.5 0 000-3z" fill="currentColor"/></svg>
  </span>
</div>

<!-- Navigation -->
<div class="nav">
  <div class="back"><svg viewBox="0 0 12 20"><path d="M10 2L2 10l8 8"/></svg></div>
  <div class="t">Transfer Details</div>
</div>

<!-- Transfer Card -->
<div class="card">
  <div class="card-hd">
    <div class="status-icon" id="sicon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="amount"><span class="dollar">$</span>{{amount}}</div>
    <div class="status-text" id="stxt">{{status}}</div>
  </div>
  <div class="desc-area" id="desc"></div>
  <div class="cells">
    <div class="cell"><span class="lab">Recipient</span><span class="val">{{recipient_name}}</span></div>
    <div class="cell"><span class="lab">Transfer Time</span><span class="val">{{transfer_time}}</span></div>
    <div class="cell"><span class="lab">Payment Method</span><span class="val">{{payment_method}}</span></div>
    <div class="cell"><span class="lab">Transaction ID</span><span class="val small">{{transaction_id}}</span></div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <div class="secure">
    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    Secured by end-to-end encryption
  </div>
</div>

<script>
(function(){
  var st = '{{status}}';
  var desc = '{{description}}';
  var isOk = st.toLowerCase().indexOf('received')>=0 || st.toLowerCase().indexOf('completed')>=0 || st.toLowerCase().indexOf('success')>=0;
  var icon = document.getElementById('sicon');
  var stxt = document.getElementById('stxt');
  icon.className = 'status-icon ' + (isOk?'ok':'wait');
  stxt.className = 'status-text ' + (isOk?'ok':'wait');
  if(!isOk){
    icon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c.55 0 1 .45 1 1v5c0 .55-.45 1-1 1s-1-.45-1-1V7c0-.55.45-1 1-1zm0 10c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>';
  }
  if(desc) document.getElementById('desc').textContent = desc;
})();
</script>
</body></html>
