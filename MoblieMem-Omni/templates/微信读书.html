<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>微信读书</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#fff;color:#333;width:450px;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}

/* iOS 状态栏 */
.status-bar{height:44px;display:flex;align-items:center;padding:0 20px;background:#fff}
.status-bar .time{font-size:15px;font-weight:600;flex:1}
.status-bar .icons{display:flex;gap:5px;align-items:center}
.status-bar .icons svg{width:17px;height:12px;fill:#333}

/* 微信读书导航 */
.nav{height:44px;display:flex;align-items:center;padding:0 16px;background:#fff;border-bottom:0.5px solid #f0f0f0}
.nav .back{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nav .back svg{width:10px;height:18px;fill:none;stroke:#333;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.nav .actions{display:flex;gap:12px;align-items:center}
.nav .actions svg{width:22px;height:22px;fill:none;stroke:#666;stroke-width:1.8}
.nav .spacer{flex:1}

/* 书籍信息区 */
.book-info{display:flex;gap:16px;padding:20px 16px 16px;background:#fff}
.book-cover{width:120px;height:168px;border-radius:4px;flex-shrink:0;overflow:hidden;position:relative;
  box-shadow:2px 4px 12px rgba(0,0,0,.15)}
.book-cover .cover-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:12px;text-align:center;
  background:linear-gradient(145deg,var(--cover-c1,#3a6fb5),var(--cover-c2,#1e4a7a))}
.book-cover .cover-title{font-size:14px;font-weight:700;color:#fff;line-height:1.35}
.book-cover .cover-author{font-size:10px;color:rgba(255,255,255,.65);margin-top:6px}
.book-cover .cover-deco{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;border:1.5px solid rgba(255,255,255,.3);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.5)}

.book-detail{flex:1;display:flex;flex-direction:column;min-width:0}
.book-detail .title{font-size:20px;font-weight:700;color:#222;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-detail .author{font-size:14px;color:#576b95;margin-top:4px}
.book-detail .readers{font-size:13px;color:#999;margin-top:4px}
.book-detail .desc{font-size:13px;color:#666;margin-top:8px;line-height:1.55;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* 统计数据行 */
.stats-row{display:flex;padding:16px 0;margin:0 16px;border-top:0.5px solid #f0f0f0;border-bottom:0.5px solid #f0f0f0}
.stat-item{flex:1;text-align:center}
.stat-item .num{font-size:20px;font-weight:700;color:#333}
.stat-item .unit{font-size:11px;color:#999}
.stat-item .label{font-size:12px;color:#999;margin-top:2px}

/* 推荐值 */
.recommend{padding:16px;margin:0}
.recommend .rec-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.recommend .rec-title{font-size:15px;color:#333}
.recommend .rec-value{font-size:22px;font-weight:700;color:#333}
.recommend .rec-pct{font-size:14px;color:#999}

.badge-area{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  background:linear-gradient(135deg,#fdf3e7,#fce8d0);border-radius:12px}
.badge .icon{font-size:16px}
.badge .text{font-size:13px;font-weight:600;color:#c5861a}
.badge .review-count{font-size:12px;color:#999;margin-left:4px}

/* 评分条 */
.rating-bars{margin-bottom:14px}
.rating-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.rating-row .label{font-size:13px;color:#666;width:32px;text-align:right}
.rating-row .bar-bg{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.rating-row .bar-fill{height:100%;border-radius:3px}
.rating-row .bar-fill.good{background:linear-gradient(90deg,#f5a623,#f7c948)}
.rating-row .bar-fill.normal{background:#ccc}
.rating-row .bar-fill.bad{background:#ddd}

/* 投票按钮 */
.vote-btns{display:flex;gap:12px}
.vote-btn{flex:1;height:40px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;
  display:flex;align-items:center;justify-content:center;gap:4px;font-size:14px;color:#666}
.vote-btn .emoji{font-size:16px}
.vote-btn.active{background:#1e80ff;border-color:#1e80ff;color:#fff}

/* CTA */
.cta{margin:16px;height:48px;border-radius:24px;background:#58b7ff;
  display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:500}

/* 书籍推荐 */
.rec-section{padding:16px;border-top:8px solid #f5f5f5}
.rec-section .sec-title{font-size:16px;font-weight:600;color:#333;margin-bottom:12px}
.rec-books{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.rec-book{width:80px;flex-shrink:0;text-align:center}
.rec-book .mini-cover{width:80px;height:108px;border-radius:3px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;padding:6px;
  text-align:center;font-size:10px;color:#fff;font-weight:600;line-height:1.3}
.rec-book .mini-title{font-size:11px;color:#333;margin-top:6px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* 底部导航栏 */
.bottom-nav{height:50px;display:flex;align-items:center;justify-content:space-around;
  border-top:0.5px solid #e8e8e8;background:#fff;padding:0 20px}
.nav-item{text-align:center;font-size:10px;color:#999}
.nav-item svg{width:22px;height:22px;display:block;margin:0 auto 2px;fill:none;stroke:#999;stroke-width:1.5}
.nav-item.active{color:#1e80ff}
.nav-item.active svg{stroke:#1e80ff}
.nav-item .btn{display:inline-flex;align-items:center;gap:4px;padding:6px 16px;
  background:#1e80ff;border-radius:16px;color:#fff;font-size:12px;font-weight:500}
.nav-item .btn svg{stroke:#fff;width:16px;height:16px}
</style></head><body>

<!-- 状态栏 -->
<div class="status-bar">
  <span class="time">{{STATUS_TIME}}</span>
  <span class="icons">
    <svg viewBox="0 0 17 12"><path d="M1 8.5a7.5 7.5 0 0115 0" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 8.5a4.5 4.5 0 019 0" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="9" r="1.5" fill="currentColor"/></svg>
    <svg viewBox="0 0 16 12"><path d="M1 4h2v8H1zM5 2h2v10H5zM9 0h2v12H9zM13 3h2v9h-2z" fill="currentColor"/></svg>
    <svg viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="currentColor"/><path d="M23 4.5v3a1.5 1.5 0 000-3z" fill="currentColor"/></svg>
  </span>
</div>

<!-- 导航 -->
<div class="nav">
  <div class="back"><svg viewBox="0 0 12 20"><path d="M10 2L2 10l8 8"/></svg></div>
  <div class="spacer"></div>
  <div class="actions">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5"/><circle cx="6" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="15" y2="14"/></svg>
  </div>
</div>

<!-- 书籍信息 -->
<div class="book-info">
  <div class="book-cover">
    <div class="cover-inner" id="coverInner">
      <div class="cover-title">{{TITLE}}</div>
      <div class="cover-author">{{AUTHOR}}</div>
      <div class="cover-deco">ⓘ</div>
    </div>
  </div>
  <div class="book-detail">
    <div class="title">{{TITLE}}</div>
    <div class="author">{{AUTHOR}}</div>
    <div class="readers">{{READER_COUNT}}万人在读此书</div>
    <div class="desc">{{DESCRIPTION}}</div>
  </div>
</div>

<!-- 统计数据 -->
<div class="stats-row">
  <div class="stat-item">
    <div class="num">{{READER_COUNT}}<span class="unit">万人</span></div>
    <div class="label">阅读</div>
  </div>
  <div class="stat-item">
    <div class="num">{{WORD_COUNT}}<span class="unit">万字</span></div>
    <div class="label">字数</div>
  </div>
  <div class="stat-item">
    <div class="num" style="font-size:16px">©</div>
    <div class="label">{{PUBLISHER}}</div>
  </div>
</div>

<!-- 推荐值 -->
<div class="recommend">
  <div class="rec-header">
    <span class="rec-title">微信读书推荐值</span>
    <span class="rec-value">{{RECOMMEND_RATE}}%</span>
  </div>
  <div class="badge-area">
    <div class="badge"><span class="icon">🏆</span><span class="text" id="badgeText">神作</span></div>
    <span class="review-count" id="reviewCountSpan">{{REVIEW_COUNT}}万人点评</span>
  </div>
  <div class="rating-bars">
    <div class="rating-row"><span class="label">好看</span><div class="bar-bg"><div class="bar-fill good" id="barGood"></div></div></div>
    <div class="rating-row"><span class="label">一般</span><div class="bar-bg"><div class="bar-fill normal" id="barNormal"></div></div></div>
    <div class="rating-row"><span class="label">不行</span><div class="bar-bg"><div class="bar-fill bad" id="barBad"></div></div></div>
  </div>
  <div class="vote-btns">
    <div class="vote-btn" id="btnGood"><span class="emoji">😊</span>好看</div>
    <div class="vote-btn" id="btnNormal"><span class="emoji">😐</span>一般</div>
    <div class="vote-btn" id="btnBad"><span class="emoji">😞</span>不行</div>
  </div>
</div>

<!-- CTA -->
<div class="cta">去微信读书 app 领取 7 天会员卡</div>

<!-- 书籍推荐 -->
<div class="rec-section">
  <div class="sec-title">书籍推荐</div>
  <div class="rec-books" id="recBooks"></div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-item"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>目录</div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18 9 9 0 000-18z"/><path d="M9 9l6 3-6 3z"/></svg>听书</div>
  <div class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M4 12h5M15 12h5M12 4v5M12 15v5"/></svg>设置</div>
  <div class="nav-item"><span class="btn"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>加入书架</span></div>
</div>

<script>
(function(){
  // 封面颜色
  var colors = [
    ['#3a6fb5','#1e4a7a'],['#8b5e3c','#5c3d2e'],['#2d6a4f','#1b4332'],
    ['#6c4ab6','#4a2d8c'],['#b5543a','#7a2e1e'],['#3a7fb5','#1e5a7a']
  ];
  var ci = Math.abs(('{{TITLE}}'.charCodeAt(0)||0)%colors.length);
  var el=document.getElementById('coverInner');
  el.style.background='linear-gradient(145deg,'+colors[ci][0]+','+colors[ci][1]+')';

  // 推荐值 bar
  var rate = parseInt('{{RECOMMEND_RATE}}')||85;
  document.getElementById('barGood').style.width = rate+'%';
  document.getElementById('barNormal').style.width = Math.max(5,100-rate-3)+'%';
  document.getElementById('barBad').style.width = '3%';

  // badge
  if(rate>=90) document.getElementById('badgeText').textContent='神作';
  else if(rate>=75) document.getElementById('badgeText').textContent='佳作';
  else document.getElementById('badgeText').textContent='可读';

  // 用户投票态
  var myVote = '{{MY_VOTE}}' || 'good';
  if(myVote==='good') document.getElementById('btnGood').classList.add('active');
  else if(myVote==='normal') document.getElementById('btnNormal').classList.add('active');
  else if(myVote==='bad') document.getElementById('btnBad').classList.add('active');

  // 推荐书籍
  var recBooksData;
  try { recBooksData = {{REC_BOOKS_JSON}}; } catch(e){ recBooksData = []; }
  var recBox = document.getElementById('recBooks');
  var recColors = ['#c0392b','#2980b9','#27ae60','#8e44ad','#d35400'];
  recBooksData.forEach(function(b,i){
    var d = document.createElement('div'); d.className='rec-book';
    d.innerHTML='<div class="mini-cover" style="background:'+recColors[i%recColors.length]+'">'+b.title+'</div>'
      +'<div class="mini-title">'+b.title+'</div>';
    recBox.appendChild(d);
  });
})();
</script>
</body></html>
