<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>bilibili</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  background:#f4f4f4;color:#212121;width:450px;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.5}

/* 状态栏 */
.status-bar{height:44px;display:flex;align-items:center;padding:0 20px;background:#fff}
.status-bar .time{font-size:15px;font-weight:600;flex:1;color:#333}
.status-bar .icons{display:flex;gap:5px;align-items:center}
.status-bar .icons svg{width:17px;height:12px;fill:#333}

/* 播放器区域 */
.player{background:#000;aspect-ratio:16/9;position:relative;overflow:hidden}
.player .cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.player .cover-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:16px;color:rgba(255,255,255,.15);font-weight:700;letter-spacing:2px}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:5}
.play-btn svg{fill:#fff;width:26px;height:26px;margin-left:3px}
.duration{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.65);color:#fff;
  font-size:11px;padding:2px 6px;border-radius:3px;font-family:'SF Mono','Menlo',monospace}
/* 弹幕 */
.danmaku-layer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:3}
.dm{position:absolute;white-space:nowrap;font-size:14px;color:#fff;
  text-shadow:1px 1px 2px rgba(0,0,0,.6),0 0 3px rgba(0,0,0,.3);
  animation:dmScroll 7s linear forwards;will-change:transform}
@keyframes dmScroll{from{transform:translateX(460px)}to{transform:translateX(-100%)}}
/* 进度条 */
.player-progress{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.15)}
.player-progress .fill{height:100%;background:#fb7299;width:35%}

/* 内容区 */
.content{background:#fff;padding:14px 16px 0}
.video-title{font-size:17px;font-weight:600;line-height:1.45;color:#212121;margin-bottom:6px}
/* 元信息 */
.meta{display:flex;align-items:center;gap:14px;font-size:12px;color:#999;margin-bottom:14px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:3px}
.meta-item svg{width:14px;height:14px;fill:#bbb;flex-shrink:0}

/* UP主 */
.up-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:0.5px solid #f0f0f0;border-bottom:0.5px solid #f0f0f0}
.up-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;position:relative;
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff}
.up-avatar .lv{position:absolute;bottom:-2px;right:-2px;background:#fb7299;color:#fff;
  font-size:8px;padding:1px 3px;border-radius:6px;font-weight:700;line-height:1}
.up-info{flex:1}
.up-info .name{font-size:14px;font-weight:500;color:#333}
.up-info .fans{font-size:11px;color:#999;margin-top:1px}
.follow-btn{font-size:12px;color:#fff;background:#fb7299;border:none;border-radius:16px;
  padding:5px 16px;font-weight:500}

/* 操作栏 */
.action-bar{display:flex;justify-content:space-around;padding:14px 0;border-bottom:0.5px solid #f0f0f0}
.action-item{text-align:center;cursor:pointer}
.action-item svg{width:24px;height:24px;fill:#666;display:block;margin:0 auto 3px}
.action-item .label{font-size:11px;color:#666}
.action-item.liked svg{fill:#fb7299}
.action-item.liked .label{color:#fb7299}

/* 简介展开 */
.desc-section{padding:12px 0;border-bottom:0.5px solid #f0f0f0}
.desc-text{font-size:13px;color:#666;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.desc-expand{font-size:12px;color:#999;margin-top:4px}

/* 标签 */
.tags{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0}
.tag{font-size:12px;color:#fb7299;background:rgba(251,114,153,.06);padding:4px 12px;border-radius:14px;
  border:0.5px solid rgba(251,114,153,.15)}

/* 评论区入口 */
.comment-entry{display:flex;align-items:center;gap:10px;padding:14px 0;border-top:0.5px solid #f0f0f0}
.comment-entry .hot-label{font-size:14px;font-weight:600;color:#212121}
.comment-entry .count{font-size:12px;color:#999;margin-left:4px}
.comment-entry .arrow{margin-left:auto;color:#ccc;font-size:16px}

/* 热评预览 */
.hot-comments{padding:0 0 16px}
.cmt-item{display:flex;gap:10px;padding:10px 0}
.cmt-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:600}
.cmt-body{flex:1}
.cmt-body .cmt-name{font-size:12px;color:#999}
.cmt-body .cmt-text{font-size:13px;color:#333;line-height:1.55;margin-top:2px}
.cmt-body .cmt-meta{display:flex;gap:12px;font-size:11px;color:#bbb;margin-top:4px}
</style></head><body>

<!-- 状态栏 -->
<div class="status-bar">
  <span class="time">{{STATUS_TIME}}</span>
  <span class="icons">
    <svg viewBox="0 0 17 12"><path d="M1 8.5a7.5 7.5 0 0115 0" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4 8.5a4.5 4.5 0 019 0" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="9" r="1.5" fill="currentColor"/></svg>
    <svg viewBox="0 0 16 12"><path d="M1 4h2v8H1zM5 2h2v10H5zM9 0h2v12H9zM13 3h2v9h-2z" fill="currentColor"/></svg>
    <svg viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="18" height="7" rx="1" fill="currentColor"/><path d="M23 4.5v3a1.5 1.5 0 000-3z" fill="currentColor"/></svg>
  </span>
</div>

<!-- 播放器 -->
<div class="player">
  <img class="cover-img" src="{{COVER_BASE64}}" alt="cover">
  <div class="cover-text">{{TITLE}}</div>
  <div class="danmaku-layer" id="dmLayer"></div>
  <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <div class="duration">{{DURATION}}</div>
  <div class="player-progress"><div class="fill" id="progressFill"></div></div>
</div>

<!-- 内容 -->
<div class="content">
  <div class="video-title">{{TITLE}}</div>
  <div class="meta">
    <div class="meta-item"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>{{VIEW_COUNT}}播放</div>
    <div class="meta-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fill="none" stroke="#bbb" stroke-width="1.5"/></svg>{{DANMAKU_COUNT}}弹幕</div>
    <div class="meta-item">{{PUBLISH_DATE}}</div>
  </div>

  <!-- UP主 -->
  <div class="up-row">
    <div class="up-avatar" id="upAvatar"><span class="lv" id="upLv">6</span></div>
    <div class="up-info">
      <div class="name">{{UPLOADER}}</div>
      <div class="fans">{{FANS_COUNT}}粉丝</div>
    </div>
    <button class="follow-btn">+ 关注</button>
  </div>

  <!-- 操作栏 -->
  <div class="action-bar" id="actionBar">
    <div class="action-item" id="actLike">
      <svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
      <div class="label">{{LIKE_COUNT}}</div>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="#666" stroke-width="1.5"/><path d="M12 6v8" stroke="#666" stroke-width="1.5" fill="none"/><circle cx="12" cy="17" r="0.5" fill="#666"/></svg>
      <div class="label">投币</div>
    </div>
    <div class="action-item" id="actFav">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z" fill="none" stroke="#666" stroke-width="1.5"/></svg>
      <div class="label">{{FAV_COUNT}}</div>
    </div>
    <div class="action-item">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3" fill="none" stroke="#666" stroke-width="1.5"/><circle cx="6" cy="12" r="3" fill="none" stroke="#666" stroke-width="1.5"/><circle cx="18" cy="19" r="3" fill="none" stroke="#666" stroke-width="1.5"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" stroke="#666" stroke-width="1.5"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" stroke="#666" stroke-width="1.5"/></svg>
      <div class="label">转发</div>
    </div>
  </div>

  <!-- 简介 -->
  <div class="desc-section" id="descSection">
    <div class="desc-text">{{DESCRIPTION}}</div>
    <div class="desc-expand">展开 ▾</div>
  </div>

  <!-- 标签 -->
  <div class="tags" id="tagsBox"></div>

  <!-- 评论区入口 -->
  <div class="comment-entry">
    <span class="hot-label">热门评论</span>
    <span class="count" id="cmtCount"></span>
    <span class="arrow">›</span>
  </div>

  <!-- 热评 -->
  <div class="hot-comments" id="hotComments"></div>
</div>

<script>
(function(){
  // UP主头像
  var upName = '{{UPLOADER}}';
  var upEl = document.getElementById('upAvatar');
  var avatarColors = ['#fb7299','#23ade5','#6ecb5a','#f45a8d','#8966cc','#f09199'];
  var ci = Math.abs((upName.charCodeAt(0)||0) % avatarColors.length);
  upEl.style.background = avatarColors[ci];
  upEl.insertBefore(document.createTextNode(upName.charAt(0)), upEl.firstChild);

  // 点赞状态
  var action = '{{ACTION}}';
  if(action && action.indexOf('赞')>=0){
    document.getElementById('actLike').classList.add('liked');
  }

  // 弹幕
  var dmLayer = document.getElementById('dmLayer');
  var dmTexts;
  try { dmTexts = {{DANMAKU_JSON}}; } catch(e){ dmTexts = ['前方高能','666','太强了','学到了','yyds']; }
  dmTexts.forEach(function(t,i){
    var d = document.createElement('div');
    d.className = 'dm';
    d.textContent = t;
    d.style.top = (8 + (i % 6) * 22) + 'px';
    d.style.animationDelay = (i * 0.9) + 's';
    d.style.fontSize = (13 + Math.random()*3) + 'px';
    dmLayer.appendChild(d);
  });

  // 标签
  var tags;
  try { tags = {{TAGS_JSON}}; } catch(e){ tags = []; }
  var tbox = document.getElementById('tagsBox');
  tags.forEach(function(t){
    var s = document.createElement('span');
    s.className = 'tag';
    s.textContent = t;
    tbox.appendChild(s);
  });

  // 评论数
  var viewCount = '{{VIEW_COUNT}}';
  document.getElementById('cmtCount').textContent = '条';

  // 热评
  var hotCmts;
  try { hotCmts = {{HOT_COMMENTS_JSON}}; } catch(e){ hotCmts = []; }
  var cmtBox = document.getElementById('hotComments');
  var cmtColors = ['#fb7299','#23ade5','#6ecb5a','#f45a8d','#8966cc'];
  hotCmts.slice(0,3).forEach(function(c,i){
    var d = document.createElement('div');
    d.className = 'cmt-item';
    d.innerHTML = '<div class="cmt-avatar" style="background:'+cmtColors[i%cmtColors.length]+'">'+
      (c.name||'匿').charAt(0)+'</div>'+
      '<div class="cmt-body"><div class="cmt-name">'+(c.name||'匿名用户')+'</div>'+
      '<div class="cmt-text">'+(c.text||'')+'</div>'+
      '<div class="cmt-meta"><span>'+(c.time||'刚刚')+'</span><span>👍 '+(c.likes||Math.floor(Math.random()*200))+'</span></div></div>';
    cmtBox.appendChild(d);
  });

  // 简介
  var desc = '{{DESCRIPTION}}';
  if(!desc) document.getElementById('descSection').style.display='none';
})();
</script>
</body></html>
