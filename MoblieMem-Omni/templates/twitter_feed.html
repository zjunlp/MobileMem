<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>X / Twitter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#000;color:#e7e9ea;
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  width:450px;overflow-x:hidden;
}

/* ── iOS Status Bar (dark) ── */
.sb{height:44px;background:#000;color:#fff;display:flex;align-items:center;padding:0 16px;font-size:15px;font-weight:600}
.sb .time{flex:1}
.sb .ri{display:flex;gap:6px;align-items:center}
.sb .ri svg{height:12px}

/* ── Top navigation ── */
.top-bar{
  background:rgba(0,0,0,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:10;border-bottom:1px solid #2f3336;
}
.top-header{height:52px;display:flex;align-items:center;padding:0 16px}
.top-header .profile-pic{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1d9bf0,#0d8ecf);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;
}
.top-header .logo{flex:1;text-align:center}
.top-header .logo svg{width:26px;height:26px;fill:#e7e9ea}
.top-header .settings{width:32px;display:flex;justify-content:flex-end}
.top-header .settings svg{width:22px;height:22px;fill:#e7e9ea}

/* Tabs */
.tabs{display:flex;height:48px}
.tabs .tab{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#71767b;font-weight:500;position:relative;cursor:pointer;
  transition:color .2s;
}
.tabs .tab.active{color:#e7e9ea;font-weight:700}
.tabs .tab.active::after{
  content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:56px;height:4px;background:#1d9bf0;border-radius:2px;
}

/* ── Tweet / Post ── */
.tweet{
  display:flex;gap:12px;padding:14px 16px;
  border-bottom:1px solid #2f3336;
}
.tweet .avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#1d9bf0,#0d8ecf);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;overflow:hidden;
}
.tweet .avatar img{width:100%;height:100%;object-fit:cover}
.tweet .content{flex:1;min-width:0}

/* Tweet header */
.tweet-header{
  display:flex;align-items:center;gap:4px;
  font-size:15px;line-height:1.3;margin-bottom:3px;
  overflow:hidden;white-space:nowrap;
}
.tweet-header .name{font-weight:700;color:#e7e9ea;flex-shrink:0}
.tweet-header .verified{flex-shrink:0}
.tweet-header .verified svg{width:18px;height:18px;fill:#1d9bf0;vertical-align:-3px}
.tweet-header .handle{color:#71767b;flex-shrink:1;overflow:hidden;text-overflow:ellipsis}
.tweet-header .dot{color:#71767b;flex-shrink:0;margin:0 2px}
.tweet-header .time{color:#71767b;flex-shrink:0}

/* Tweet body */
.tweet-body{
  font-size:15px;line-height:1.5;color:#e7e9ea;
  word-break:break-word;margin-bottom:10px;
}

/* ── Actions bar ── */
.actions{
  display:flex;align-items:center;justify-content:space-between;
  max-width:380px;
}
.action{
  display:flex;align-items:center;gap:4px;
  font-size:13px;color:#71767b;cursor:pointer;
  padding:4px 0;transition:color .15s;
}
.action svg{width:18px;height:18px;fill:currentColor}
.action.reply:hover,.action.reply:hover svg{color:#1d9bf0}
.action.retweet:hover,.action.retweet:hover svg{color:#00ba7c}
.action.like:hover,.action.like:hover svg{color:#f91880}
.action.views:hover,.action.views:hover svg{color:#1d9bf0}
.action.share:hover,.action.share:hover svg{color:#1d9bf0}

/* ── Bottom Tab Bar ── */
.bottom-bar{
  background:#000;border-top:1px solid #2f3336;
  height:52px;display:flex;align-items:center;justify-content:space-around;
  padding:0 20px;
}
.bottom-bar svg{width:26px;height:26px;fill:#e7e9ea}
.bottom-bar .active svg{fill:#e7e9ea}

/* ── Compose button ── */
.compose-btn{
  position:fixed;bottom:64px;right:20px;
  width:56px;height:56px;border-radius:50%;
  background:#1d9bf0;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(29,155,240,.4);
}
.compose-btn svg{width:24px;height:24px;fill:#fff}
</style>
</head>
